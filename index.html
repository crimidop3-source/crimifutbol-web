<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIMIFUTBOL | INICIO - HUB FPC</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* --- MOTOR DE COLORES DINÁMICOS --- */
        :root {
            /* Definimos los dos colores neón */
            --neon-red: #ff0032;
            --neon-blue: #00f2ff;
            --gx-dark: #0b0b0b;

            /* ESTA VARIABLE ES LA QUE CAMBIA CON JAVASCRIPT */
            --gx-accent: var(--neon-blue); /* Empieza en azul por defecto */
            
            /* Glow dinámico basado en el acento */
            --gx-glow: rgba(0, 242, 255, 0.5); /* Empieza en azul por defecto */
        }
        
        body { 
            background-color: var(--gx-dark); color: white; 
            font-family: 'Rajdhani', sans-serif; margin: 0; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0b0b0b 100%);
            transition: background-color 0.5s ease; /* Transición suave de color de fondo */
        }

        /* Estilo Barra de Navegación */
        nav {
            background-color: #000; border-bottom: 2px solid var(--gx-accent);
            padding: 15px 50px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 15px var(--gx-glow);
            transition: border-color 0.5s ease, box-shadow 0.5s ease; /* Transiciones suaves */
        }

        .logo-nav { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; letter-spacing: 3px; }
        .accent { color: var(--gx-accent); text-shadow: 0 0 10px var(--gx-accent); transition: color 0.5s ease, text-shadow 0.5s ease; }

        .nav-links a {
            color: white; text-decoration: none; font-weight: bold;
            margin-left: 30px; text-transform: uppercase; transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active { color: var(--gx-accent); text-shadow: 0 0 5px var(--gx-accent); }

        /* Contenido Central */
        .hub-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 80vh; text-align: center;
        }

        /* Foto de Perfil con Borde Parpadeante (Live) */
        .profile-pic {
            width: 200px; height: 200px; border-radius: 50%;
            object-fit: cover; border: 5px solid #333; /* Borde apagado por defecto */
            transition: border-color 0.5s ease, box-shadow 0.5s ease; /* Transiciones suaves */
        }

        /* Clase para activar el parpadeo "LIVE" */
        .live-active {
            border-color: var(--gx-accent) !important;
            box-shadow: 0 0 20px var(--gx-accent);
            animation: pulse-border 1.5s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(var(--gx-accent-rgb), 0.7); } /* Usaremos JS para RGB */
            70% { box-shadow: 0 0 0 20px rgba(var(--gx-accent-rgb), 0); }
            100% { box-shadow: 0 0 0 0 rgba(var(--gx-accent-rgb), 0); }
        }

        .username { font-family: 'Orbitron', sans-serif; font-size: 3rem; margin: 20px 0; letter-spacing: 5px; }

        /* Botón TikTok GX */
        .btn-live {
            background: var(--gx-accent); color: white; text-decoration: none;
            font-weight: bold; font-size: 1.2rem; padding: 15px 40px; cursor: pointer;
            text-transform: uppercase; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            transition: 0.3s, background-color 0.5s ease, box-shadow 0.5s ease; /* Transiciones suaves */
            box-shadow: 0 0 10px var(--gx-glow);
        }

        .btn-live:hover { transform: scale(1.05); filter: brightness(1.2); box-shadow: 0 0 20px var(--gx-accent); }

    </style>
</head>
<body>

<nav>
    <div class="logo-nav">CRIMIFUTBOL <span class="accent">Hub</span></div>
    <div class="nav-links">
        <a href="index.html" class="active">Inicio</a>
        <a href="juegos.html">Juegos FPC</a>
    </div>
</nav>

<div class="hub-container">
    <img src="perfil.jpg" alt="Foto de Perfil Crimifutbol" class="profile-pic" id="profile-pic">
    
    <div class="username">@crimifutbol<span class="accent">_</span></div>

    <a href="LINK_A_TU_TIKTOK" target="_blank" class="btn-live" id="btn-live">
        Ir al TikTok
    </a>
</div>

<script>
    // --- LÓGICA DE CONTROL DE "EN VIVO" ---
    const estaEnVivo = true; // Cambia a 'false' para probar apagado

    function actualizarEstadoLive() {
        const pic = document.getElementById('profile-pic');
        const btn = document.getElementById('btn-live');

        if (estaEnVivo) {
            pic.classList.add('live-active');
            btn.innerText = "¡ESTAMOS EN VIVO! 🔥 Ver ahora";
        } else {
            pic.classList.remove('live-active');
            btn.innerText = "Ir al TikTok";
        }
    }

    // --- LÓGICA DEL CAMBIO DE COLOR (Cada 5 minutos) ---
    function actualizarColorGamer() {
        const ahora = new Date();
        const minutos = ahora.getMinutes();
        const root = document.documentElement;

        // Calculamos en qué ciclo de 5 minutos estamos (par o impar)
        // minutos / 5 nos da un número (0, 1, 2, 3...)
        // Usamos Math.floor() para redondear hacia abajo (0, 1, 2, 3...)
        // El operador % 2 nos dice si es par (azul) o impar (rojo)
        const cicloRojo = Math.floor(minutos / 5) % 2 === 1;

        if (cicloRojo) {
            // Cambiamos las variables CSS a Rojo
            root.style.setProperty('--gx-accent', 'var(--neon-red)');
            root.style.setProperty('--gx-glow', 'rgba(255, 0, 50, 0.5)');
            root.style.setProperty('--gx-accent-rgb', '255, 0, 50'); // Para la animación pulse
            console.log("🎨 Modo GX: Rojo Neón Activado");
        } else {
            // Cambiamos las variables CSS a Azul (por defecto)
            root.style.setProperty('--gx-accent', 'var(--neon-blue)');
            root.style.setProperty('--gx-glow', 'rgba(0, 242, 255, 0.5)');
            root.style.setProperty('--gx-accent-rgb', '0, 242, 255'); // Para la animación pulse
            console.log("🎨 Modo GX: Azul Neón Activado");
        }
    }

    // Ejecutamos las funciones al cargar la página
    actualizarEstadoLive();
    actualizarColorGamer(); // Ejecutamos una vez al inicio

    // Configuramos para que revise el color cada minuto
    // Así detecta el cambio de ciclo sin esperar 5 minutos enteros
    setInterval(actualizarColorGamer, 60000); 

</script>

</body>
</html>
