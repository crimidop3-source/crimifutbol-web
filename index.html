<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRIMIFUTBOL | GX DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gx-red: #ff0032; --gx-dark: #0b0b0b; --gx-card: #161616; --gx-glow: rgba(255, 0, 50, 0.5); }
        
        body { 
            background-color: var(--gx-dark); color: white; 
            font-family: 'Rajdhani', sans-serif; margin: 0; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0b0b0b 100%);
        }

        /* Estilo Opera GX Header */
        header {
            border-bottom: 2px solid var(--gx-red); padding: 20px;
            text-align: center; box-shadow: 0 0 15px var(--gx-glow);
        }

        .logo { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; letter-spacing: 5px; }
        .red { color: var(--gx-red); text-shadow: 0 0 10px var(--gx-red); }

        /* Buscador Impacto */
        .search-container { max-width: 600px; margin: 50px auto; padding: 20px; }
        
        .gx-input-group { position: relative; display: flex; gap: 10px; }
        
        input {
            flex: 1; background: var(--gx-card); border: 2px solid #333;
            padding: 15px; color: white; font-size: 1.1rem; border-radius: 4px;
            transition: 0.3s;
        }

        input:focus { border-color: var(--gx-red); outline: none; box-shadow: 0 0 15px var(--gx-glow); }

        button {
            background: var(--gx-red); color: white; border: none; font-weight: bold;
            padding: 0 30px; cursor: pointer; text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); transition: 0.3s;
        }

        button:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* Carta de Jugador GX */
        #player-card {
            max-width: 500px; margin: 20px auto; background: var(--gx-card);
            border: 1px solid #333; border-left: 5px solid var(--gx-red);
            padding: 30px; display: none; animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .racha-fire { color: #ff8c00; font-size: 2rem; font-weight: bold; text-shadow: 0 0 15px #ff4500; }
        
        .xp-bar { background: #222; height: 12px; margin-top: 20px; border-radius: 6px; overflow: hidden; }
        .xp-fill { background: var(--gx-red); height: 100%; box-shadow: 0 0 10px var(--gx-red); transition: width 1s ease-in-out; }
    </style>
</head>
<body>

<header>
    <div class="logo">CRIMIFUTBOL <span class="red">GX</span></div>
</header>

<div class="search-container">
    <div class="gx-input-group">
        <input type="text" id="username" placeholder="INTRODUCE TU USUARIO...">
        <button onclick="checkStats()">CONSULTAR</button>
    </div>

    <div id="player-card">
        <h2 id="res-name" style="margin-top:0;">@USUARIO</h2>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <p style="margin:0; color: #888;">RACHA ACTUAL</p>
                <div id="res-racha" class="racha-fire">0 DÍAS 🔥</div>
            </div>
            <div style="text-align: right;">
                <p style="margin:0; color: #888;">NIVEL</p>
                <div id="res-nivel" style="font-size: 1.5rem; font-weight: bold;">1</div>
            </div>
        </div>
        <div class="xp-bar"><div id="res-bar" class="xp-fill" style="width: 0%"></div></div>
        <p id="res-beneficio" style="color: var(--gx-red); font-weight: bold; margin-top: 15px;"></p>
    </div>
</div>

<script>
    // URL de tu JSON en GitHub (después lo actualizaremos)
    const JSON_URL = "user_exp.json"; 

    async function checkStats() {
        const userSearch = document.getElementById('username').value.trim().toLowerCase();
        const card = document.getElementById('player-card');

        try {
            const response = await fetch(JSON_URL);
            const data = await response.json();
            const user = data.users.find(u => u.username.toLowerCase() === userSearch);

            if (user) {
                card.style.display = 'block';
                document.getElementById('res-name').innerText = "@" + user.username.toUpperCase();
                document.getElementById('res-racha').innerText = (user.rachaDias || 0) + " DÍAS 🔥";
                document.getElementById('res-nivel').innerText = user.level || 1;
                
                // Animación de la barra de nivel (basada en el nivel actual)
                const expProgress = (user.exp % 1000) / 10; 
                document.getElementById('res-bar').style.width = expProgress + "%";

                // Beneficio dinámico
                let msg = "BONO ACTUAL: IMPULSO ESTÁNDAR";
                if(user.rachaDias >= 15) msg = "BONO: ¡SUPER FUERZA X2 ACTIVADA! 🧨";
                else if(user.rachaDias >= 5) msg = "BONO: IMPULSO X1.5 ⚡";
                document.getElementById('res-beneficio').innerText = msg;
                
            } else {
                alert("JUGADOR NO ENCONTRADO EN LA BASE DE DATOS");
            }
        } catch (e) {
            console.error(e);
            alert("ERROR AL CONECTAR CON EL SERVIDOR GX");
        }
    }
</script>

</body>
</html>
